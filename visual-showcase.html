<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#040a12" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23040a12' stroke='%233ee8ff' stroke-width='2'/%3E%3C/svg%3E"
    />
    <title>Deep Abyss — Visual showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --abyss: #040a12;
        --bio: #3ee8ff;
        --mist: #8aa4b8;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        overflow: hidden;
        background: var(--abyss);
        color: #dce8f0;
        font-family: "Outfit", system-ui, sans-serif;
      }
      #showcaseMount {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      .showcase-legend {
        position: fixed;
        z-index: 2;
        left: max(12px, env(safe-area-inset-left, 0px));
        top: max(12px, env(safe-area-inset-top, 0px));
        max-width: min(320px, calc(100vw - 24px));
        padding: 12px 14px;
        font-size: 0.78rem;
        line-height: 1.45;
        color: var(--mist);
        background: rgba(4, 14, 28, 0.82);
        border: 1px solid rgba(62, 232, 255, 0.22);
        border-radius: 10px;
        pointer-events: none;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .showcase-legend h1 {
        margin: 0 0 6px;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--bio);
      }
      .showcase-legend p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="showcase-legend">
      <h1>Visual reference</h1>
      <p>
        Simulation is not running — path tiles, defenses, creatures, and combat
        VFX samples only. Pan with drag; no mission HUD.
      </p>
    </div>
    <div id="showcaseMount" aria-label="Visual showcase scene"></div>
    <script type="module" src="/src/render/visual-showcase.ts"></script>
  </body>
</html>
